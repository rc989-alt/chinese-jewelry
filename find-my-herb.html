<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YÀOCǍO · Find My Herb</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=EB+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --jiliang: #F2EBD8;
    --jiliang-2: #EAE0C8;
    --jiliang-3: #DDD3B8;
    --wengyan: #4A7165;
    --wengyan-l: #5E8A7C;
    --jiaoyi: #7B7845;
    --yingse: #B8963A;
    --yingse-l: #CBA94E;
    --chizhang: #C49080;
    --ink: #1E1A14;
    --ink-mid: #4A4438;
    --ink-dim: #8A8070;
    --white: #FDFAF4;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--jiliang);
    color: var(--ink);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    overflow-x: hidden;
    cursor: none;
  }

  .cursor {
    position: fixed; width: 7px; height: 7px; background: var(--wengyan);
    border-radius: 50%; pointer-events: none; z-index: 9999;
    transform: translate(-50%, -50%); transition: transform 0.1s;
  }
  .cursor-ring {
    position: fixed; width: 32px; height: 32px; border: 1px solid rgba(74,113,101,0.45);
    border-radius: 50%; pointer-events: none; z-index: 9998;
    transform: translate(-50%, -50%);
    transition: transform 0.3s, width 0.3s, height 0.3s, border-color 0.3s;
  }
  .cursor-ring.hover { width: 48px; height: 48px; border-color: var(--wengyan); }

  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 1.4rem 2rem;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(242,235,216,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--jiliang-3);
  }
  .nav-logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1rem; font-weight: 400; letter-spacing: 0.25em;
    color: var(--wengyan); text-decoration: none;
  }
  .nav-back {
    font-size: 0.64rem; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-mid); text-decoration: none;
    border-bottom: 1px solid var(--jiliang-3); padding-bottom: 2px;
  }

  .quiz-shell {
    min-height: 100vh;
    padding-top: 76px;
    display: flex;
    flex-direction: column;
  }
  .quiz-progress-bar {
    height: 2px; background: var(--jiliang-3); flex-shrink: 0;
  }
  .quiz-progress-fill {
    height: 100%; width: 0; background: var(--wengyan); transition: width 0.5s ease;
  }
  .quiz-body {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 3rem 2rem; position: relative; overflow: hidden;
  }
  .quiz-question {
    max-width: 680px; width: 100%; text-align: center;
    position: absolute; transition: opacity 0.45s ease, transform 0.45s ease;
  }
  .quiz-question.active { opacity: 1; transform: translateX(0); position: relative; }
  .quiz-question.exit-left { opacity: 0; transform: translateX(-60px); }
  .quiz-question.enter-right { opacity: 0; transform: translateX(60px); }

  .quiz-q-num {
    font-size: 0.58rem; letter-spacing: 0.4em; text-transform: uppercase;
    color: var(--wengyan); margin-bottom: 2rem;
    display: flex; align-items: center; justify-content: center; gap: 1rem;
  }
  .quiz-q-num::before,
  .quiz-q-num::after {
    content: ''; display: block; width: 24px; height: 1px; background: rgba(74,113,101,0.4);
  }
  .quiz-q-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.8rem, 4vw, 3rem); font-weight: 300;
    color: var(--ink); line-height: 1.2; margin-bottom: 3rem;
  }
  .quiz-q-text em { font-style: italic; color: var(--wengyan); }

  .quiz-options {
    display: flex; flex-direction: column; gap: 0.9rem;
    max-width: 520px; margin: 0 auto;
  }
  .quiz-option {
    display: flex; align-items: center; gap: 1.2rem;
    padding: 1.1rem 1.6rem; background: var(--white);
    border: 1px solid var(--jiliang-3); cursor: none;
    transition: all 0.25s; text-align: left;
    font-family: 'EB Garamond', serif; font-size: 1rem; color: var(--ink-mid);
    position: relative; overflow: hidden;
  }
  .quiz-option::before {
    content: ''; position: absolute; inset: 0; background: var(--wengyan);
    transform: scaleX(0); transform-origin: left; transition: transform 0.3s ease; z-index: 0;
  }
  .quiz-option:hover { border-color: var(--wengyan); color: var(--wengyan); }
  .quiz-option:hover::before { transform: scaleX(0.04); }
  .quiz-option-glyph {
    font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; font-style: italic;
    color: var(--wengyan); opacity: 0.6; width: 20px; flex-shrink: 0; z-index: 1;
  }
  .quiz-option-text { z-index: 1; line-height: 1.4; }
  .quiz-option-sub {
    font-size: 0.8rem; color: var(--ink-dim); display: block; margin-top: 2px; font-style: italic;
  }

  .quiz-result {
    display: none; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 3rem 2rem; max-width: 680px; margin: 0 auto; width: 100%;
  }
  .quiz-result.active { display: flex; }
  .result-eyebrow {
    font-size: 0.6rem; letter-spacing: 0.4em; text-transform: uppercase;
    color: var(--wengyan); margin-bottom: 2rem;
    display: flex; align-items: center; gap: 1rem;
  }
  .result-eyebrow::before,
  .result-eyebrow::after {
    content: ''; display: block; width: 24px; height: 1px; background: rgba(74,113,101,0.4);
  }
  .result-herb-cn {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 8vw, 6rem); font-weight: 300; color: var(--ink);
    line-height: 1; margin-bottom: 0.3rem; opacity: 0; animation: herbReveal 0.9s ease 0.2s forwards;
  }
  .result-herb-en {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.2rem, 3vw, 2rem); font-style: italic; font-weight: 300;
    color: var(--wengyan); margin-bottom: 0.5rem; letter-spacing: 0.05em;
    opacity: 0; animation: herbReveal 0.9s ease 0.4s forwards;
  }
  .result-pinyin {
    font-size: 0.7rem; letter-spacing: 0.3em; color: var(--ink-dim); margin-bottom: 2.5rem;
    opacity: 0; animation: herbReveal 0.9s ease 0.5s forwards;
  }
  .result-match-line {
    width: 1px; height: 40px; background: linear-gradient(to bottom, var(--wengyan), transparent);
    margin: 0 auto 2rem; opacity: 0; animation: herbReveal 0.6s ease 0.7s forwards;
  }
  .result-desc {
    font-family: 'EB Garamond', serif; font-size: 1rem; line-height: 1.85; color: var(--ink-mid);
    max-width: 440px; margin: 0 auto 2.5rem; opacity: 0; animation: herbReveal 0.9s ease 0.8s forwards;
  }
  .result-product {
    display: flex; align-items: center; gap: 1.5rem; background: var(--white);
    border: 1px solid var(--jiliang-3); padding: 1.2rem 1.8rem; max-width: 440px; width: 100%;
    margin: 0 auto 2rem; opacity: 0; animation: herbReveal 0.9s ease 1s forwards; text-align: left;
  }
  .result-product-dot {
    width: 36px; height: 36px; border-radius: 50%; background: rgba(74,113,101,0.12);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--wengyan); font-style: italic;
  }
  .result-product-name {
    font-family: 'Cormorant Garamond', serif; font-size: 1rem; color: var(--ink); font-weight: 400;
  }
  .result-product-sub { font-size: 0.72rem; color: var(--ink-dim); letter-spacing: 0.05em; margin-top: 2px; }
  .result-product-price {
    font-family: 'Cormorant Garamond', serif; font-size: 1.1rem; color: var(--yingse); margin-left: auto; flex-shrink: 0;
  }
  .result-actions {
    display: flex; gap: 1rem; align-items: center; opacity: 0; animation: herbReveal 0.9s ease 1.1s forwards;
  }
  .btn-main {
    font-family: 'Jost', sans-serif; font-size: 0.68rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--white); background: var(--wengyan); padding: 0.9rem 2.2rem; text-decoration: none;
    border: none; cursor: none; transition: background 0.3s;
  }
  .btn-main:hover { background: var(--wengyan-l); }
  .result-explore {
    font-size: 0.62rem; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--ink-dim); background: none; border: none; cursor: none;
    font-family: 'Jost', sans-serif; padding-bottom: 1px; border-bottom: 1px solid var(--jiliang-3);
  }

  @keyframes herbReveal {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 900px) {
    nav { padding: 1.2rem 1.2rem; }
    .quiz-body { padding: 2rem 1rem; }
    .result-product { flex-direction: column; align-items: flex-start; }
    .result-product-price { margin-left: 0; }
    .result-actions { flex-direction: column; }
  }
</style>
</head>
<body>
<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<nav>
  <a href="eng04.04" class="nav-logo">YÀOCǍO · Find My Herb</a>
  <a href="eng04.04" class="nav-back">Back to Home</a>
</nav>

<main class="quiz-shell">
  <div class="quiz-progress-bar">
    <div class="quiz-progress-fill" id="quizProgress"></div>
  </div>

  <div class="quiz-body">
    <section class="quiz-question active" id="q1">
      <p class="quiz-q-num">Question 1 of 3</p>
      <h2 class="quiz-q-text">What brings you here<br><em>today?</em></h2>
      <div class="quiz-options">
        <button class="quiz-option" onclick="answerQ(1, 'sleep')">
          <span class="quiz-option-glyph">息</span>
          <span class="quiz-option-text">I can't quiet my mind<span class="quiz-option-sub">Anxiety, restlessness, sleeplessness</span></span>
        </button>
        <button class="quiz-option" onclick="answerQ(1, 'vitality')">
          <span class="quiz-option-glyph">氣</span>
          <span class="quiz-option-text">I'm running on empty<span class="quiz-option-sub">Burnout, exhaustion, low energy</span></span>
        </button>
        <button class="quiz-option" onclick="answerQ(1, 'love')">
          <span class="quiz-option-glyph">愛</span>
          <span class="quiz-option-text">My heart feels closed<span class="quiz-option-sub">Heartbreak, grief, disconnection</span></span>
        </button>
        <button class="quiz-option" onclick="answerQ(1, 'protection')">
          <span class="quiz-option-glyph">護</span>
          <span class="quiz-option-text">I absorb everything around me<span class="quiz-option-sub">Sensitivity, energy drain, overwhelm</span></span>
        </button>
        <button class="quiz-option" onclick="answerQ(1, 'abundance')">
          <span class="quiz-option-glyph">流</span>
          <span class="quiz-option-text">I feel stuck and uninspired<span class="quiz-option-sub">Stagnation, financial fear, blocked creativity</span></span>
        </button>
      </div>
    </section>

    <section class="quiz-question enter-right" id="q2">
      <p class="quiz-q-num">Question 2 of 3</p>
      <h2 class="quiz-q-text">What do you most need<br><em>right now?</em></h2>
      <div class="quiz-options">
        <button class="quiz-option" onclick="answerQ(2, 'sleep')">
          <span class="quiz-option-glyph">靜</span>
          <span class="quiz-option-text">A mind that can finally be still<span class="quiz-option-sub">Peace, rest, permission to slow down</span></span>
        </button>
        <button class="quiz-option" onclick="answerQ(2, 'vitality')">
          <span class="quiz-option-glyph">生</span>
          <span class="quiz-option-text">My energy and aliveness back<span class="quiz-option-sub">Vitality, strength, renewal</span></span>
        </button>
        <button class="quiz-option" onclick="answerQ(2, 'love')">
          <span class="quiz-option-glyph">開</span>
          <span class="quiz-option-text">To open my heart again<span class="quiz-option-sub">Healing, self-compassion, trust</span></span>
        </button>
        <button class="quiz-option" onclick="answerQ(2, 'protection')">
          <span class="quiz-option-glyph">界</span>
          <span class="quiz-option-text">To feel safe in my own energy<span class="quiz-option-sub">Boundaries, protection, groundedness</span></span>
        </button>
        <button class="quiz-option" onclick="answerQ(2, 'abundance')">
          <span class="quiz-option-glyph">通</span>
          <span class="quiz-option-text">To feel like I'm moving again<span class="quiz-option-sub">Flow, abundance, forward momentum</span></span>
        </button>
      </div>
    </section>

    <section class="quiz-question enter-right" id="q3">
      <p class="quiz-q-num">Question 3 of 3</p>
      <h2 class="quiz-q-text">Where do you carry<br><em>your stress?</em></h2>
      <div class="quiz-options">
        <button class="quiz-option" onclick="answerQ(3, 'sleep')">
          <span class="quiz-option-glyph">腦</span>
          <span class="quiz-option-text">In my head - it never fully switches off<span class="quiz-option-sub">Mental load, racing thoughts</span></span>
        </button>
        <button class="quiz-option" onclick="answerQ(3, 'vitality')">
          <span class="quiz-option-glyph">體</span>
          <span class="quiz-option-text">In my body - I feel heavy, slow<span class="quiz-option-sub">Physical fatigue, depletion</span></span>
        </button>
        <button class="quiz-option" onclick="answerQ(3, 'love')">
          <span class="quiz-option-glyph">心</span>
          <span class="quiz-option-text">In my chest - a tightness around the heart<span class="quiz-option-sub">Grief, unexpressed emotion</span></span>
        </button>
        <button class="quiz-option" onclick="answerQ(3, 'protection')">
          <span class="quiz-option-glyph">皮</span>
          <span class="quiz-option-text">On my skin - I feel everything too much<span class="quiz-option-sub">Hyper-sensitivity, porous energy</span></span>
        </button>
        <button class="quiz-option" onclick="answerQ(3, 'abundance')">
          <span class="quiz-option-glyph">腹</span>
          <span class="quiz-option-text">In my gut - a low hum of unease<span class="quiz-option-sub">Anxiety about the future, scarcity</span></span>
        </button>
      </div>
    </section>

    <section class="quiz-result" id="quizResult">
      <p class="result-eyebrow">Your Herb</p>
      <div class="result-herb-cn" id="resultHerbCN">沉香</div>
      <div class="result-herb-en" id="resultHerbEN">Agarwood</div>
      <div class="result-pinyin" id="resultPinyin">Chen Xiang · Heart-settling</div>
      <div class="result-match-line"></div>
      <p class="result-desc" id="resultDesc"></p>
      <div class="result-product">
        <div class="result-product-dot" id="resultGlyph">息</div>
        <div>
          <div class="result-product-name" id="resultProductName"></div>
          <div class="result-product-sub" id="resultProductSub"></div>
        </div>
        <div class="result-product-price" id="resultPrice"></div>
      </div>
      <div class="result-actions">
        <button class="btn-main" id="resultCartButton">Add to Cart</button>
        <a class="result-explore" href="eng04.04">Explore all herbs</a>
      </div>
    </section>
  </div>
</main>

<script>
const quizData = {
  scores: { sleep: 0, vitality: 0, love: 0, protection: 0, abundance: 0 },
  weights: {
    q1: { sleep: 10, vitality: 8, love: 6, protection: 4, abundance: 2 },
    q2: { sleep: 8, vitality: 10, love: 8, protection: 6, abundance: 4 },
    q3: { sleep: 6, vitality: 4, love: 8, protection: 10, abundance: 6 }
  },
  herbs: {
    sleep: { cn: '沉香', en: 'Agarwood', pinyin: 'Chen Xiang · Heart-settling', glyph: '息', product: 'Agarwood Serenity Bracelet', sub: '沉香安神串 · Sleep & Calm', price: '$54', desc: 'The earth made agarwood for minds like yours - the ones that will not stop moving. Its warmth does not force stillness. It reminds you that stillness is already there, waiting beneath the noise.' },
    vitality: { cn: '人参', en: 'Ginseng', pinyin: 'Ren Shen · Life-force herb', glyph: '氣', product: 'Ginseng Vitality Bracelet', sub: '人参补气串 · Vitality & Renewal', price: '$58', desc: 'Ginseng has one purpose: to call your energy home. Not borrowed energy, not caffeine energy - the deep, constitutional kind. You had it once. This is the path back.' },
    love: { cn: '玫瑰', en: 'Rose', pinyin: 'Mei Gui · Heart-opening herb', glyph: '愛', product: 'Rose Heart Bracelet', sub: '玫瑰疏肝串 · Love & Healing', price: '$52', desc: 'Rose moves the grief that got stuck. Not by forcing you to feel better - but by gently making space for what was never fully felt, so the heart can open again on its own time.' },
    protection: { cn: '朱砂', en: 'Cinnabar', pinyin: 'Zhu Sha · Boundary herb', glyph: '護', product: 'Cinnabar Ward Bracelet', sub: '朱砂辟邪串 · Protection & Boundaries', price: '$62', desc: 'For those who feel everything. Cinnabar does not shut the world out - it helps you know where you end and others begin. Your sensitivity is a gift. This keeps it yours.' },
    abundance: { cn: '檀香', en: 'Sandalwood', pinyin: 'Tan Xiang · Flow-opening herb', glyph: '流', product: 'Golden Sandalwood Bracelet', sub: '檀香财流串 · Abundance & Flow', price: '$56', desc: 'Sandalwood clears the fog between you and what you are meant to do. Stagnation is not your nature - it is a signal. The herb helps you hear what you already know.' }
  }
};

function answerQ(qNum, choice) {
  const w = quizData.weights[`q${qNum}`];
  Object.keys(w).forEach(key => {
    if (key === choice) quizData.scores[key] += w[key];
    else quizData.scores[key] += Math.max(0, w[key] - 6);
  });

  document.getElementById('quizProgress').style.width = `${(qNum / 3) * 100}%`;

  if (qNum < 3) {
    const curEl = document.getElementById(`q${qNum}`);
    const nextEl = document.getElementById(`q${qNum + 1}`);
    curEl.classList.add('exit-left');
    curEl.classList.remove('active');
    setTimeout(() => {
      curEl.style.display = 'none';
      nextEl.classList.remove('enter-right');
      nextEl.classList.add('active');
    }, 420);
    return;
  }

  showResult();
}

function showResult() {
  document.getElementById('quizProgress').style.width = '100%';
  const winner = Object.entries(quizData.scores).sort((a, b) => b[1] - a[1])[0][0];
  const herb = quizData.herbs[winner];
  document.getElementById('resultHerbCN').textContent = herb.cn;
  document.getElementById('resultHerbEN').textContent = herb.en;
  document.getElementById('resultPinyin').textContent = herb.pinyin;
  document.getElementById('resultDesc').textContent = herb.desc;
  document.getElementById('resultGlyph').textContent = herb.glyph;
  document.getElementById('resultProductName').textContent = herb.product;
  document.getElementById('resultProductSub').textContent = herb.sub;
  document.getElementById('resultPrice').textContent = herb.price;
  document.getElementById('resultCartButton').textContent = `Add to Cart - ${herb.price}`;

  const curEl = document.getElementById('q3');
  curEl.classList.add('exit-left');
  setTimeout(() => {
    curEl.style.display = 'none';
    document.getElementById('quizResult').classList.add('active');
  }, 420);
}

const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');
document.addEventListener('mousemove', event => {
  cursor.style.left = `${event.clientX}px`;
  cursor.style.top = `${event.clientY}px`;
  ring.style.left = `${event.clientX}px`;
  ring.style.top = `${event.clientY}px`;
});
document.querySelectorAll('a, button').forEach(el => {
  el.addEventListener('mouseenter', () => ring.classList.add('hover'));
  el.addEventListener('mouseleave', () => ring.classList.remove('hover'));
});
</script>
</body>
</html>
